<!DOCTYPE html>
<html>
<head>
    <title>Carbon Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="earth"></div>

<div class="container">
    <h1>Carbon Emission Calculator</h1>

    <label for="vehicle">Vehicle km</label>
    <input type="number" id="vehicle" placeholder="Enter km">

    <label for="electricity">Electricity kWh</label>
    <input type="number" id="electricity" placeholder="Enter kWh">

    <button onclick="calculate()">Calculate</button>

    <h2 id="result"></h2>
</div>

<script src="script.js"></script>

</body>
</html>
